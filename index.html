<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widget — tryb połączony</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#EEF1F6;color:#15181D;min-height:100vh;}
.demo-bar{background:#15181D;color:#fff;text-align:center;padding:9px 14px;font-size:12.5px;}
.demo-header{text-align:center;padding:56px 24px 36px;border-bottom:1px solid #E3E6EB;background:#fff;}
.demo-logo{font-size:32px;font-weight:700;letter-spacing:-1px;}
.demo-tag{font-size:14px;color:#8A9099;margin-top:6px;}
.demo-main{max-width:880px;margin:0 auto;padding:36px 24px 160px;color:#4A5159;font-size:14px;}
</style>
</head>
<body>

<!-- STRONA DEMO (usuń u klienta) -->
<div class="demo-bar">Tryb testowy — widget pobiera konfigurację z serwera po siteId</div>
<header class="demo-header"><div class="demo-logo">EKG</div><div class="demo-tag">strona klienta</div></header>
<main class="demo-main">Tę stronę zastąpi prawdziwa witryna. Czat pojawia się w rogu po pobraniu konfiguracji.</main>


<!-- ╔════════════ WIDGET — POCZĄTEK (wklej u klienta) ════════════╗ -->
<style>
:root{
  --w-brand:#1E3A8A; --w-brand-rgb:30,58,138;
  --w-accent:#D4AF37; --w-accent-rgb:212,175,55;
  --w-bg:#FFFFFF; --w-bg-soft:#F1F3F8; --w-bot-bubble:#EDEFF4;
  --w-text:#16203A; --w-border:#DCE2EC;
}
#w-shell,#w-shell *{box-sizing:border-box;font-family:'Segoe UI',system-ui,sans-serif;}
#w-shell{position:fixed;bottom:24px;right:24px;width:66px;height:66px;border-radius:50%;background:var(--w-bg);overflow:hidden;z-index:2147483000;transition:width .44s cubic-bezier(.34,1.28,.5,1),height .44s cubic-bezier(.34,1.28,.5,1),border-radius .4s ease,box-shadow .4s ease;}
html.w-left #w-shell{left:24px;right:auto;}
#w-shell.collapsed{box-shadow:0 6px 20px rgba(0,0,0,.18);animation:wGlow 3.8s ease-in-out infinite;}
#w-shell.collapsed.thinking{animation-duration:1.15s;}
#w-shell.expanded{width:376px;height:560px;border-radius:22px;max-width:calc(100vw - 32px);max-height:calc(100vh - 110px);box-shadow:0 16px 50px rgba(15,23,42,.22);}
@keyframes wGlow{0%,100%{box-shadow:0 6px 20px rgba(0,0,0,.18),0 0 0 0 rgba(var(--w-brand-rgb),0);}50%{box-shadow:0 8px 26px rgba(0,0,0,.20),0 0 22px 3px rgba(var(--w-brand-rgb),.40);}}
#w-orb-btn{position:absolute;inset:0;background:transparent;border:none;cursor:pointer;z-index:5;border-radius:inherit;}
#w-orb-btn:focus-visible{outline:3px solid rgba(var(--w-brand-rgb),.6);outline-offset:3px;}
#w-shell.expanded #w-orb-btn{display:none;}
.w-fab-face{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--w-brand);transition:opacity .28s ease,transform .32s ease;}
.w-fab-face svg{width:27px;height:27px;}
#w-shell.collapsed .w-fab-face{opacity:1;transform:none;}
#w-shell.expanded .w-fab-face{opacity:0;transform:scale(1.3);}
#w-panel{position:absolute;inset:0;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .2s ease;}
#w-shell.expanded #w-panel{opacity:1;pointer-events:auto;transition:opacity .26s ease .15s;}
.w-head{background:var(--w-brand);padding:13px 14px;display:flex;align-items:center;gap:11px;flex-shrink:0;}
.w-head-av{position:relative;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;animation:wAvPulse 2.6s ease-in-out infinite;}
.w-head-av img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;}
.w-av-icon{display:flex;}.w-av-icon svg{width:20px;height:20px;}
#w-shell.thinking .w-head-av{animation-duration:.9s;}
@keyframes wAvPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,255,255,0);}50%{box-shadow:0 0 0 5px rgba(255,255,255,.5);}}
.w-head-info{flex:1;min-width:0;}
.w-head-name{font-size:15px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.w-head-status{font-size:11px;color:rgba(255,255,255,.78);margin-top:2px;display:flex;align-items:center;gap:5px;}
.w-sdot{width:7px;height:7px;border-radius:50%;background:var(--w-accent);flex-shrink:0;}
.w-head-btn{background:none;border:none;cursor:pointer;padding:5px;border-radius:7px;color:rgba(255,255,255,.62);display:flex;transition:color .15s,background .15s;flex-shrink:0;}
.w-head-btn:hover{color:#fff;background:rgba(255,255,255,.14);}
.w-head-btn:focus-visible{outline:2px solid #fff;outline-offset:1px;}
.w-head-btn svg{width:18px;height:18px;}
.w-quick{padding:10px 12px;display:flex;gap:6px;border-bottom:1px solid var(--w-border);flex-shrink:0;background:var(--w-bg-soft);overflow-x:auto;scrollbar-width:none;}
.w-quick::-webkit-scrollbar{display:none;}
.w-qbtn{background:#fff;border:1px solid var(--w-border);border-radius:20px;font-size:12px;padding:6px 13px;cursor:pointer;color:var(--w-text);font-family:inherit;white-space:nowrap;transition:all .15s;}
.w-qbtn:hover{background:var(--w-accent);color:var(--w-brand);border-color:var(--w-accent);font-weight:600;}
.w-msgs{flex:1;overflow-y:auto;padding:14px 13px 8px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth;}
.w-msgs::-webkit-scrollbar{width:3px;}.w-msgs::-webkit-scrollbar-thumb{background:#cdd4df;border-radius:3px;}
.w-note{align-self:center;text-align:center;font-size:10.5px;color:#8A93A5;background:rgba(0,0,0,.035);border:1px solid var(--w-border);padding:5px 11px;border-radius:10px;margin:2px auto;max-width:94%;}
.w-msg{max-width:88%;font-size:13.5px;line-height:1.55;padding:9px 13px;border-radius:16px;animation:wPop .18s ease;word-wrap:break-word;}
@keyframes wPop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.w-bot{background:var(--w-bot-bubble);color:var(--w-text);border-bottom-left-radius:4px;align-self:flex-start;}
.w-usr{background:var(--w-brand);color:#fff;border-bottom-right-radius:4px;align-self:flex-end;}
.w-bot p{margin:0 0 5px;}.w-bot p:last-child{margin:0;}
.w-bot ul{padding-left:18px;margin:5px 0 2px;}.w-bot li{margin-bottom:3px;}.w-bot strong{font-weight:600;}
.w-err{align-self:center;text-align:center;font-size:12px;color:#B42318;background:#FEF3F2;border:1px solid #FECDCA;padding:8px 12px;border-radius:12px;max-width:92%;}
.w-typing{background:var(--w-bot-bubble);border-radius:16px;border-bottom-left-radius:4px;padding:12px 15px;align-self:flex-start;display:flex;gap:4px;}
.w-typing span{width:7px;height:7px;border-radius:50%;background:#b6bcc6;animation:wDot 1.2s infinite;}
.w-typing span:nth-child(2){animation-delay:.2s;}.w-typing span:nth-child(3){animation-delay:.4s;}
@keyframes wDot{0%,80%,100%{transform:scale(.65);opacity:.4}40%{transform:scale(1);opacity:1}}
.w-inputbar{padding:10px 12px 12px;border-top:1px solid var(--w-border);display:flex;gap:7px;flex-shrink:0;background:var(--w-bg);}
#w-ta{flex:1;border:1.5px solid var(--w-border);border-radius:11px;padding:9px 12px;font-size:13.5px;font-family:inherit;color:var(--w-text);background:var(--w-bg-soft);outline:none;resize:none;min-height:40px;max-height:96px;line-height:1.4;transition:border-color .15s,background .15s;}
#w-ta:focus{border-color:var(--w-brand);background:#fff;}#w-ta::placeholder{color:#AEB4BD;}
#w-send{width:40px;height:40px;border-radius:11px;flex-shrink:0;background:var(--w-brand);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:filter .15s,transform .1s;}
#w-send:hover{filter:brightness(1.12);}#w-send:active{transform:scale(.93);}
#w-send:disabled{opacity:.35;cursor:not-allowed;}
#w-send:focus-visible{outline:2px solid var(--w-accent);outline-offset:2px;}
#w-send svg{width:17px;height:17px;}
.w-footer{text-align:center;font-size:10px;color:#b4b9c2;padding:0 12px 8px;}
@media(max-width:430px){#w-shell{bottom:16px;right:14px;}html.w-left #w-shell{left:14px;}#w-shell.expanded{width:100vw;height:90vh;right:0;left:0;bottom:0;border-radius:16px 16px 0 0;max-width:100vw;max-height:90vh;}}
@media(prefers-reduced-motion:reduce){#w-shell,.w-fab-face,#w-panel,.w-msg,.w-head-av{transition:none!important;animation:none!important;}.w-typing span{animation:none;opacity:.6;}}
</style>

<div id="w-shell" class="collapsed">
  <button id="w-orb-btn" aria-label="Otwórz czat"></button>
  <div class="w-fab-face" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div>
  <div id="w-panel" role="dialog" aria-label="Okno czatu">
    <div class="w-head">
      <div class="w-head-av">
        <img id="w-head-logo" src="" alt="">
        <span class="w-av-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></span>
      </div>
      <div class="w-head-info">
        <div class="w-head-name" id="w-name">Asystent</div>
        <div class="w-head-status"><span class="w-sdot"></span><span id="w-status">Online</span></div>
      </div>
      <button class="w-head-btn" id="w-reset" title="Nowa rozmowa" aria-label="Rozpocznij nową rozmowę"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg></button>
      <button class="w-head-btn" id="w-close" title="Zamknij" aria-label="Zamknij czat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="w-quick" id="w-quick"></div>
    <div class="w-msgs" id="w-msgs"></div>
    <div class="w-inputbar">
      <textarea id="w-ta" rows="1" placeholder="Napisz wiadomość..." aria-label="Treść wiadomości"></textarea>
      <button id="w-send" aria-label="Wyślij wiadomość"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13" stroke="#fff"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="#fff"/></svg></button>
    </div>
    <div class="w-footer" id="w-footer">hostowane przez EKG SA</div>
  </div>
</div>

<!-- ★ KONFIGURACJA — tylko dwie rzeczy ★ -->
<script>
window.WIDGET = {
  siteId:     "test-firma",                                            // identyfikator firmy (nadaje operator)
  backendUrl: "https://projekta.edziopedzio1939.workers.dev",    // Twój worker
};
</script>

<!-- SILNIK — NIE EDYTUJ -->
<script>
(function(){
  const W = window.WIDGET || {};
  const BASE = (W.backendUrl||'').replace(/\/+$/,'');
  const SITE = W.siteId||'';
  let open=false, busy=false, greeted=false, history=[], transcript=[], C={};
  const $ = id => document.getElementById(id);
  const reduceMotion = matchMedia('(prefers-reduced-motion:reduce)').matches;
  const shell=$('w-shell');
  const HIST_KEY="w_hist_"+SITE, OPEN_KEY="w_autoopen_"+SITE;
  const store={get(k){try{return sessionStorage.getItem(k);}catch(e){return null;}},set(k,v){try{sessionStorage.setItem(k,v);}catch(e){}},del(k){try{sessionStorage.removeItem(k);}catch(e){}}};
  function hexToRgb(h){if(!h)return null;h=String(h).replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');if(h.length!==6)return null;const n=parseInt(h,16);if(isNaN(n))return null;return [(n>>16)&255,(n>>8)&255,n&255];}

  // 1) pobierz publiczny wyglad, potem zbuduj UI
  fetch(BASE+'/config?site='+encodeURIComponent(SITE))
    .then(r=>r.json()).then(d=>{ C=(d&&d.config)||{}; })
    .catch(()=>{ C={}; })
    .finally(init);

  function init(){
    const root=document.documentElement.style;
    if(C.brandColor)root.setProperty('--w-brand',C.brandColor);
    if(C.accentColor)root.setProperty('--w-accent',C.accentColor);
    const br=hexToRgb(C.brandColor); if(br)root.setProperty('--w-brand-rgb',br.join(','));
    const ar=hexToRgb(C.accentColor); if(ar)root.setProperty('--w-accent-rgb',ar.join(','));
    if((C.position||'right')==='left')document.documentElement.classList.add('w-left');
    $('w-name').textContent=C.botName||'Asystent';
    $('w-status').textContent=C.statusText||'Online';
    $('w-footer').textContent=C.footerText||'powered by Twoja Firma';
    if(C.logoUrl){const hl=$('w-head-logo');hl.src=C.logoUrl;hl.style.display='block';const ic=document.querySelector('.w-av-icon');if(ic)ic.style.display='none';}

    const qbar=$('w-quick');
    const qq=(C.quickQuestions||[]).slice(0,5);
    qq.forEach(q=>{const t=typeof q==='string'?q:(q.text||q.label||'');const b=document.createElement('button');b.className='w-qbtn';b.type='button';b.textContent=t;b.onclick=()=>send(t);qbar.appendChild(b);});
    if(!qq.length)qbar.style.display='none';
    if(C.aiDisclosure&&String(C.aiDisclosure).trim())addNote();

    try{const raw=store.get(HIST_KEY);if(raw){const s=JSON.parse(raw);if(Array.isArray(s)&&s.length){transcript=s;greeted=true;s.forEach(m=>{msg(m.t,m.r==='user'?'usr':'bot',false);history.push({role:m.r==='user'?'user':'model',parts:[{text:m.t}]});});}}}catch(e){}

    if(C.autoOpen!==false && !((C.autoOpenOnce) && store.get(OPEN_KEY))){
      setTimeout(()=>{if(!open)openWin();if(C.autoOpenOnce)store.set(OPEN_KEY,'1');},(C.autoOpenDelay||0)*1000);
    }

    $('w-orb-btn').addEventListener('click',openWin);
    $('w-close').addEventListener('click',closeWin);
    $('w-reset').addEventListener('click',reset);
    $('w-send').addEventListener('click',()=>send($('w-ta').value));
    $('w-ta').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send($('w-ta').value);}});
    $('w-ta').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,96)+'px';});
    addEventListener('keydown',e=>{if(e.key==='Escape'&&open)closeWin();});
  }

  function addNote(){const n=document.createElement('div');n.className='w-note';n.textContent=C.aiDisclosure;$('w-msgs').appendChild(n);}
  function openWin(){open=true;shell.classList.add('expanded');shell.classList.remove('collapsed');if(!greeted){greeted=true;setTimeout(greet,reduceMotion?0:300);}setTimeout(()=>$('w-ta').focus(),reduceMotion?0:360);}
  function closeWin(){open=false;shell.classList.remove('expanded');shell.classList.add('collapsed');}
  function reset(){history=[];transcript=[];store.del(HIST_KEY);$('w-msgs').innerHTML='';if(C.aiDisclosure&&String(C.aiDisclosure).trim())addNote();greeted=true;greet();$('w-ta').focus();}
  function greet(){msg(C.welcomeMessage||'Cześć! W czym mogę pomóc?','bot',false);}
  function send(text){text=(text||'').trim();if(!text||busy)return;const ta=$('w-ta');ta.value='';ta.style.height='auto';msg(text,'usr');history.push({role:'user',parts:[{text}]});typing(true);setBusy(true);
    fetch(BASE+'/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({siteId:SITE,history})})
      .then(async r=>{let d={};try{d=await r.json();}catch(e){throw new Error('Zła odpowiedź');}if(!r.ok||d.error)throw new Error(d.error||('HTTP '+r.status));if(!d.reply)throw new Error('Pusta odpowiedź');return d.reply;})
      .then(reply=>{history.push({role:'model',parts:[{text:reply}]});typing(false);msg(reply,'bot');})
      .catch(err=>{typing(false);console.error('[widget]',err);errMsg('Nie udało się połączyć z asystentem. Spróbuj ponownie za chwilę.');})
      .finally(()=>{setBusy(false);$('w-ta').focus();});
  }
  function msg(text,role,persist){const w=$('w-msgs'),d=document.createElement('div');d.className='w-msg w-'+role;d.innerHTML=role==='bot'?md(text):esc(text);w.appendChild(d);w.scrollTop=w.scrollHeight;if(persist!==false&&(role==='usr'||role==='bot')){transcript.push({r:role==='usr'?'user':'bot',t:text});store.set(HIST_KEY,JSON.stringify(transcript));}}
  function errMsg(text){const w=$('w-msgs'),d=document.createElement('div');d.className='w-err';d.textContent=text;w.appendChild(d);w.scrollTop=w.scrollHeight;}
  function md(t){let s=esc(t);s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');s=s.replace(/^[•\-\*]\s+(.+)$/gm,'<li>$1</li>');s=s.replace(/(<li>[\s\S]*?<\/li>\s*)+/g,m=>'<ul>'+m+'</ul>');return s.split(/\n{2,}/).map(p=>p.indexOf('<ul>')>-1?p:'<p>'+p.replace(/\n/g,'<br>')+'</p>').join('');}
  function esc(t){return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  let typEl=null;
  function typing(show){const w=$('w-msgs');if(show){typEl=document.createElement('div');typEl.className='w-typing';typEl.innerHTML='<span></span><span></span><span></span>';w.appendChild(typEl);w.scrollTop=w.scrollHeight;}else if(typEl){typEl.remove();typEl=null;}}
  function setBusy(v){busy=v;$('w-send').disabled=v;shell.classList.toggle('thinking',v);}
})();
</script>
<!-- ╚════════════ WIDGET — KONIEC ════════════╝ -->

</body>
</html>
